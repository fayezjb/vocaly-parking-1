<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>نظام مواقف حفلة فوكالي </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: #111827;
            --border-color: #1f2937;
            --gold: #d4af37;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            /* منع تكبير الشاشة اللمسي عند الضغط المتكرر */
            touch-action: manipulation; 
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Tajawal', sans-serif; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; gap: 12px; }
        
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(8,12,20,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; color: var(--gold); gap: 15px; }
        .loading-overlay.hide { display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(212, 175, 55, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }

        header { display: flex; justify-content: space-between; align-items: center; background-color: var(--card-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; }
        header h1 { font-size: 16px; font-weight: 800; color: var(--gold); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .stat-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px 4px; text-align: center; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: 800; font-family: 'Poppins', sans-serif; }

        .section-title { font-size: 13px; font-weight: 700; color: #fff; margin: 4px 0; display: flex; align-items: center; gap: 6px; }
        .section-title i { color: var(--gold); }

        .lot-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; }
        .lot-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; font-weight: 700; }
        .lot-cap { font-size: 10px; color: var(--text-muted); }
        
        .lot-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-ctrl { flex: 1; height: 42px; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; color: #fff; cursor: pointer; user-select: none; }
        .btn-minus { background-color: #1e293b; }
        .btn-plus { background-color: var(--gold); color: #000; }
        
        /* تصميم صندوق الإدخال لكتابة الأرقام بالكيبورد */
        .num-input { 
            width: 65px; 
            height: 42px;
            background-color: #0d131f;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            text-align: center; 
            font-size: 18px; 
            font-weight: 700; 
            font-family: 'Poppins', sans-serif; 
        }
        /* إخفاء أسهم الـ input الافتراضية لشكل أملس */
        .num-input::-webkit-outer-spin-button,
        .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .num-input { -moz-appearance: textfield; }

        .chart-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .chart-row { display: flex; align-items: center; gap: 8px; }
        .chart-lbl { width: 30px; font-size: 10px; color: var(--text-muted); font-weight: bold; }
        .chart-bg { flex-grow: 1; height: 14px; background-color: #1f2937; border-radius: 3px; overflow: hidden; }
        .chart-fill { height: 100%; background: linear-gradient(90deg, #b38f20, var(--gold)); width: 0%; transition: width 0.3s; }
        .chart-val { width: 35px; text-align: left; font-size: 10px; font-weight: 700; font-family: 'Poppins', sans-serif; }

        .sync-btn { width: 100%; height: 50px; background-color: var(--success); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: auto; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--success); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 12px; font-weight: bold; transition: transform 0.3s; z-index: 100; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <span>جاري الاتصال بقاعدة البيانات السحابية الحية...</span>
    </div>

    <header>
        <h1>مواقف حفلة فوكالي </h1>
        <button style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:14px;" onclick="fetchLiveFields()"><i class="fa-solid fa-rotate"></i> تحديث</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">السيارات الحالية</div><div class="stat-value" id="totalCurrent">0</div></div>
        <div class="stat-card"><div class="stat-label">المواقف الشاغرة</div><div class="stat-value" id="totalRemaining">-</div></div>
        <div class="stat-card"><div class="stat-label">نسبة الإشغال</div><div class="stat-value" id="totalOccupancy">0%</div></div>
    </div>

    <div id="lotsContainer"></div>

    <div class="chart-box">
        <div class="section-title"><i class="fa-solid fa-chart-bar"></i> <span>مراقبة نسبة</span></div>
        <div class="bar-chart" id="chartContainer"></div>
    </div>

    <button class="sync-btn" onclick="syncToCloud()"><i class="fa-solid fa-cloud-arrow-up"></i> حفظ وتحديث الرابط فوراً</button>
    <div class="toast" id="toast">✓ تم حفظ البيانات سحابياً بنجاح لايف!</div>

    <script>
        const FIREBASE_URL = "https://vocaly-parking-default-rtdb.firebaseio.com/data.json";

        const parkingConfig = {
            'CP1': { name: 'المواقف العامة (CP1)', capacity: 50 },
            'CP2': { name: 'المواقف العامة (CP2)', capacity: 65 },
            'CP3': { name: 'المواقف العامة (CP3)', capacity: 400 },
            'VIP1': { name: 'مواقف كبار الشخصيات (VIP1)', capacity: 500 },
            'VIP2': { name: 'مواقف كبار الشخصيات (VIP2)', capacity: 150 }
        };

        let parkingLots = [
            { id: 'CP1', name: parkingConfig['CP1'].name, capacity: parkingConfig['CP1'].capacity, current: 0 },
            { id: 'CP2', name: parkingConfig['CP2'].name, capacity: parkingConfig['CP2'].capacity, current: 0 },
            { id: 'CP3', name: parkingConfig['CP3'].name, capacity: parkingConfig['CP3'].capacity, current: 0 },
            { id: 'VIP1', name: parkingConfig['VIP1'].name, capacity: parkingConfig['VIP1'].capacity, current: 0 },
            { id: 'VIP2', name: parkingConfig['VIP2'].name, capacity: parkingConfig['VIP2'].capacity, current: 0 }
        ];

        async function fetchLiveFields() {
            document.getElementById('loading').classList.remove('hide');
            try {
                let response = await fetch(FIREBASE_URL);
                let cloudData = await response.json();
                
                if (cloudData && Array.isArray(cloudData)) {
                    parkingLots = cloudData.map(item => ({
                        id: item.id,
                        name: parkingConfig[item.id].name,
                        capacity: parkingConfig[item.id].capacity,
                        current: item.current || 0
                    }));
                }
                renderUI();
            } catch (e) { 
                renderUI();
            }
            document.getElementById('loading').classList.add('hide');
        }

        function renderUI() {
            const container = document.getElementById('lotsContainer');
            const chart = document.getElementById('chartContainer');
            
            // حفظ الحقول التي في وضع التركيز حالياً لتفادي إغلاق الكيبورد أثناء الكتابة
            const activeId = document.activeElement ? document.activeElement.dataset.id : null;
            
            container.innerHTML = ''; chart.innerHTML = '';
            let totalCur = 0, totalCap = 0;

            parkingLots.forEach(lot => {
                totalCur += lot.current; totalCap += lot.capacity;
                let pct = lot.capacity > 0 ? (lot.current / lot.capacity) * 100 : 0;

                container.insertAdjacentHTML('beforeend', `
                    <div class="lot-card" style="margin-bottom:6px;">
                        <div class="lot-info"><span>${lot.name}</span><span class="lot-cap">السعة: ${lot.capacity}</span></div>
                        <div class="lot-actions">
                            <button class="btn-ctrl btn-minus" onclick="changeVal('${lot.id}', -1)">-</button>
                            <input type="number" class="num-input" data-id="${lot.id}" pattern="[0-9]*" inputmode="numeric" value="${lot.current}" oninput="updateInputVal('${lot.id}', this.value)">
                            <button class="btn-ctrl btn-plus" onclick="changeVal('${lot.id}', 1)">+</button>
                        </div>
                    </div>
                `);

                chart.insertAdjacentHTML('beforeend', `
                    <div class="chart-row">
                        <span class="chart-lbl">${lot.id}</span>
                        <div class="chart-bg"><div class="chart-fill" style="width: ${pct}%"></div></div>
                        <span class="chart-val">${pct.toFixed(1)}%</span>
                    </div>
                `);
            });

            document.getElementById('totalCurrent').innerText = totalCur.toLocaleString();
            document.getElementById('totalRemaining').innerText = (totalCap - totalCur).toLocaleString();
            document.getElementById('totalOccupancy').innerText = totalCap > 0 ? ((totalCur / totalCap) * 100).toFixed(1) + '%' : '0%';

            // إعادة التركيز للحقل المفتوح لتأمين استمرار الكيبورد مفتوحاً
            if (activeId) {
                const inputEl = container.querySelector(`input[data-id="${activeId}"]`);
                if (inputEl) inputEl.focus();
            }
        }

        function changeVal(id, amt) {
            let lot = parkingLots.find(l => l.id === id);
            if(lot && (lot.current + amt >= 0) && (lot.current + amt <= lot.capacity)) {
                lot.current += amt;
                renderUI();
            }
        }

        function updateInputVal(id, val) {
            let lot = parkingLots.find(l => l.id === id);
            if(lot) {
                let num = parseInt(val) || 0;
                if (num < 0) num = 0;
                if (num > lot.capacity) num = lot.capacity;
                lot.current = num;
                
                // تحديث الإحصائيات الفوقية والرسوم بدون إعادة بناء الحقول لتلافي مشاكل الكيبورد
                updateLiveTotalsOnly();
            }
        }

        function updateLiveTotalsOnly() {
            let totalCur = 0, totalCap = 0;
            parkingLots.forEach(lot => {
                totalCur += lot.current; totalCap += lot.capacity;
                let pct = lot.capacity > 0 ? (lot.current / lot.capacity) * 100 : 0;
                
                // تحديث البارات الجانبية مباشرة
                const rows = document.getElementById('chartContainer').children;
                for(let row of rows) {
                    if(row.children[0].innerText === lot.id) {
                        row.children[1].children[0].style.width = pct + '%';
                        row.children[2].innerText = pct.toFixed(1) + '%';
                    }
                }
            });
            document.getElementById('totalCurrent').innerText = totalCur.toLocaleString();
            document.getElementById('totalRemaining').innerText = (totalCap - totalCur).toLocaleString();
            document.getElementById('totalOccupancy').innerText = totalCap > 0 ? ((totalCur / totalCap) * 100).toFixed(1) + '%' : '0%';
        }

        async function syncToCloud() {
            document.getElementById('loading').classList.remove('hide');
            let uploadData = parkingLots.map(l => ({id: l.id, current: l.current}));
            
            try {
                let response = await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(uploadData)
                });
                
                if (response.ok) {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2500);
                    renderUI(); // إعادة رسم متناسق بعد الحفظ
                } else {
                    alert("مشكلة في استجابة السيرفر السحابي.");
                }
            } catch(e) {
                alert("حدث خطأ في الاتصال بقاعدة البيانات!");
            }
            document.getElementById('loading').classList.add('hide');
        }

        // كود إضافي بالـ JS لمنع تكبير المتصفح عند الضغط المزدوج على أجهزة iOS وأندرويد
        document.addEventListener('data-id', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        fetchLiveFields();
    </script>
</body>
</html>
